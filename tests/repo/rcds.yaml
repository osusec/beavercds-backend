flag_regex: dam{[a-zA-Z...]}

registry:
  domain: localhost:5000/damctf
  tag_format: "{{domain}}/{{challenge}}/{{container}}:{{profile}}"
  # or environment vars e.g. BEAVERCDS_REGISTRY_BUILD_USER / etc
  build:
    user: admin
    pass: notrealcreds
  cluster:
    user: cluster
    pass: alsofake

defaults:
  point_class: "standard"
  resources: { cpu: 1, memory: 500M }

point_classes:
  - name: "standard"
    min: 100
    max: 1337
  - name: "simple"
    min: 100
    max: 500

deploy:
  # control challenge deployment status explicitly per environment/profile
  testing:
    misc/garf: true
    pwn/notsh: true
    web/bar: true

profiles:
  # configure per-environment credentials etc
  testing:
    frontend_url: http://mock_frontend.localhost:8080
    frontend_token: secretsecretsecret
    challenges_domain: chals.frontend.example
    kubecontext: testcluster
    s3:
      bucket_name: testbucket
      endpoint: localhost:9000
      region: x
      access_key: somekey
      secret_key: somesecret
    dns:
      provider: inmemory
